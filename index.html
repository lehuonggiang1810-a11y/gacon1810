<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CozyHome - Link Converter</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #ee4d2d; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #result { margin-top: 20px; font-weight: bold; color: green; word-break: break-all; }
    </style>
</head>
<body>

    <h2>Công cụ chuyển đổi Link mua hàng</h2>
    <p>Dán link sản phẩm vào đây để nhận ưu đãi:</p>
    
    <input type="text" id="userInput" placeholder="Dán link Shopee hoặc sản phẩm tại đây...">
    <br>
    <button onclick="convertLink()">CONVERT NGAY</button>

    <div id="result"></div>

    <script>
        function convertLink() {
            const input = document.getElementById('userInput').value;
            const resultDiv = document.getElementById('result');

            if (input.trim() === "") {
                alert("Vui lòng dán link trước!");
                return;
            }

            const myAffiliateID = "https://shopee.vn/user/account/profile"; 

            let finalLink = "";
            if (input.includes("?")) {
                finalLink = input + "&aff_click_id=" + myAffiliateID;
            } else {
                finalLink = input + "?aff_click_id=" + myAffiliateID;
            }
            resultDiv.innerHTML = `
                <p>Link của bạn đã sẵn sàng:</p>
                <a href="${finalLink}" target="_blank">${finalLink}</a>
                <br><br>
                <small>(Nhấn vào link trên để mua hàng)</small>
            `;
        }
    </script>
</body>
</html>
