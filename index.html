<script>
const AFFILIATE_LINK = "https://shope.ee/https://shopee.vn/user/purchase/"; // 

async function convert(){
  let input = document.getElementById("link").value.trim();
  if(!input){
    alert("Bạn chưa dán link Shopee");
    return;
  }

  document.getElementById("result").innerText = "Đang xử lý...";

  try{
    // Nếu là link rút gọn shope.ee
    if(input.includes("shope.ee")){
      let res = await fetch(input, { redirect: "follow" });
      input = res.url;
    }

    let url = new URL(input);
    let cleanLink = url.origin + url.pathname;

    document.getElementById("result").innerText = cleanLink;

    // 🔥 Redirect qua link affiliate (tracking)
    setTimeout(()=>{
      window.location.href = AFFILIATE_LINK;
    }, 1200);

  }catch(e){
    document.getElementById("result").innerText = "https://shopee.vn/user/purchase/";
  }
}
</script>
